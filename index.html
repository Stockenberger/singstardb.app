<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SingStarDB</title>
  <link rel="icon" type="image/png" href="./assets/logo.png">
  <!-- Google Fonts for Modern Typography -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <!-- Custom Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Dynamic Background Element -->
  <div class="background-blob blob-1"></div>
  <div class="background-blob blob-2"></div>
  <div class="background-blob blob-3"></div>

  <div class="container glass-panel">
    <!-- Header Section -->
    <header>
      <a href="https://github.com/Stockenberger/singstardb.app/" target="_blank" class="github-link" aria-label="View source on GitHub">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-github">
          <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 undefined 0 0-1 .94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 undefined 0 0-0 1.5-3.78c0-3.9 1-3.9 1s-1.54-.3-3.84 1.25a13.3 13.3 undefined 0 0-0-7-0C6.15 2.1 5 2.5 5 2.5a5.46 5.46 undefined 0 0-0-1.5 3.78c0 5.42 3.3 6.61 6.44 7a3.37 3.37 undefined 0 0-1-.94 2.58A8.8 8.8 undefined 0 0-1 9 19"></path>
          <path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"></path>
          <path d="M9 18c-4.51 2-5-2-7-2"></path>
        </svg>
      </a>
      <div class="logo-container">

    <!-- Controls Section -->
    <section class="controls">
      <div class="search-wrapper">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" id="searchInput" placeholder="Search for a song or artist..." autocomplete="off">
      </div>

      <div class="select-wrapper">
        <select id="countrySelect">
          <option value="All">Global (All Regions)</option>
          <!-- Options will be populated dynamically via JS based on singstarData.json -->
        </select>
        <svg class="select-chevron" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </div>
    </section>

    <!-- Results Section -->
    <section class="results-container">
      <div class="results-meta">
        <span id="resultsCount">Loading songs...</span>
      </div>
      
      <!-- The dynamic song list gets injected here -->
      <ul id="songList" class="song-list">
        <!-- List Items injected via JS -->
      </ul>
      
      <!-- Empty state container for no results -->
      <div id="noResults" class="empty-state hidden">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M16 16s-1.5-2-4-2-4 2-4 2"></path><line x1="9" y1="9" x2="9.01" y2="9"></line><line x1="15" y1="9" x2="15.01" y2="9"></line></svg>
        <p>No songs found matching your search.</p>
      </div>
    </section>
  </div>

  <!-- Custom Logic Script -->
  <script src="app.js"></script>
</body>
</html>
